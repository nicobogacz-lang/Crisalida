<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Path 3 — La Ciudad Invisible</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Gabarito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#0a0e1a;color:#e0dde8;}
body{font-family:'Nunito',sans-serif;display:flex;flex-direction:column;position:relative;}

.screen{display:none;flex-direction:column;height:100%;width:100%;position:absolute;top:0;left:0;z-index:1;}
.screen.active{display:flex;}
.fade-in{animation:fadeIn .45s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.7}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 6px rgba(212,168,69,.3))}50%{filter:drop-shadow(0 0 14px rgba(212,168,69,.5))}}

:root{
  --sky:#0a0e1a;--sky2:#10162a;
  --warm:#d4a845;--warm-soft:rgba(212,168,69,.1);--warm-border:rgba(212,168,69,.2);
  --green:#3db8a0;--green-soft:rgba(61,184,160,.08);
  --blue:#4a7ad9;--red:#d96060;--purple:#8b6cc7;--pink:#d96a8a;
  --text:#e0dde8;--muted:rgba(224,221,232,.45);--muted2:rgba(224,221,232,.25);
  --card:rgba(255,255,255,.04);--border:rgba(255,255,255,.07);
  --amber:#d4a845;--amber-soft:rgba(212,168,69,.1);--amber-border:rgba(212,168,69,.2);
  --sage:#5a9a8a;--sage-soft:rgba(90,154,138,.1);
}

/* ══ INTRO ══ */
#intro{align-items:center;justify-content:center;gap:1.2rem;padding:2rem;text-align:center;background:radial-gradient(ellipse at 50% 80%,#141a2e,#0a0e1a);}
.intro-badge{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.18em;color:var(--warm);background:var(--warm-soft);padding:5px 16px;border-radius:20px;border:1px solid var(--warm-border);}
.intro-icon{font-size:64px;animation:glow 3s ease-in-out infinite;}
.intro-title{font-family:Gabarito,sans-serif;font-size:30px;font-weight:700;color:#fff;line-height:1.2;}
.intro-sub{font-size:15px;color:var(--muted);line-height:1.6;max-width:300px;}
.intro-input{display:flex;flex-direction:column;gap:6px;width:100%;max-width:260px;}
.intro-input label{font-size:12px;color:var(--muted);text-align:left;}
.intro-input input{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-family:Nunito,sans-serif;font-size:16px;color:#fff;outline:none;width:100%;}

.intro-input-group{display:flex;flex-direction:column;gap:10px;width:100%;max-width:260px;}
.intro-input-group .intro-input{margin:0;}
#pf-sync-status{font-size:11px;color:var(--muted,#888);text-align:center;margin-top:8px;min-height:16px;}
.intro-input input:focus{border-color:var(--warm);}
.btn{font-family:Gabarito,sans-serif;font-size:14px;font-weight:600;padding:11px 28px;border-radius:12px;border:none;cursor:pointer;touch-action:manipulation;transition:all .15s;}
.btn:active{transform:scale(.96);}
.btn-warm{background:var(--warm);color:#1a0800;}
.btn-warm:disabled{opacity:.25;}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border);}

/* ══ MAP ══ */
#map-screen{background:radial-gradient(ellipse at 50% 30%,#10162a,#0a0e1a);}
.map-header{padding:14px 16px 6px;flex-shrink:0;}
.map-header-row{display:flex;justify-content:space-between;align-items:center;}
.map-header h2{font-family:Gabarito,sans-serif;font-size:18px;font-weight:600;color:#fff;}
.map-header-meta{display:flex;gap:8px;align-items:center;}
.map-header-tag{font-family:Gabarito,sans-serif;font-size:10px;letter-spacing:.08em;color:var(--warm);background:var(--warm-soft);border:1px solid var(--warm-border);padding:3px 8px;border-radius:8px;}
.map-header-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.map-header-sub span{color:var(--warm);font-weight:700;}

.map-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 14px 20px;}

/* Zone cards grid */
.map-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.zone-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px 12px;border-radius:16px;background:var(--card);border:1px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .25s;text-align:center;position:relative;opacity:0;animation:fadeIn .4s ease forwards;}
.zone-card:active{transform:scale(.95);}
.zone-card.completed{opacity:.35;pointer-events:none;}
.zone-card-ring{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;transition:transform .2s;}
.zone-card-ring::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1.5px solid;opacity:.3;animation:pulse 3s ease infinite;}
.zone-card-name{font-family:Gabarito,sans-serif;font-size:12px;font-weight:700;color:#fff;line-height:1.2;}
.zone-card-desc{font-size:10px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.zone-card-check{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;background:var(--green);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;}
.zone-card.completed .zone-card-check{display:flex;}

/* Central city icon */
.map-compass{grid-column:2;display:flex;align-items:center;justify-content:center;padding:10px;}
.compass-svg{width:80px;height:80px;animation:glow 4s ease-in-out infinite;}

/* ══ GAME ══ */
#game-screen{background:#0a0e1a;}
.game-top{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(0,0,0,.4);border-bottom:1px solid var(--border);}
.game-back{font-size:13px;color:var(--muted);cursor:pointer;touch-action:manipulation;}
.game-label{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.12em;color:var(--warm);opacity:.7;}
.game-body{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* Narrative */
.campo-wrap{flex:1;display:flex;flex-direction:column;padding:14px 16px;gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.campo-sub{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted2);text-align:center;}
.campo-visual{text-align:center;font-size:52px;padding:4px 0;flex-shrink:0;}
.campo-bubble{padding:8px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);text-align:center;}
.campo-bubble-label{font-size:11px;color:var(--muted2);}
.campo-bubble-text{font-size:14px;color:var(--warm);font-style:italic;margin-top:2px;}
.campo-prompt{font-family:Gabarito,sans-serif;font-size:16px;font-weight:600;color:#fff;line-height:1.5;text-align:center;}
.campo-opts{display:flex;flex-direction:column;gap:8px;padding-bottom:16px;}
.campo-opt{display:flex;align-items:flex-start;gap:12px;padding:13px;border-radius:14px;background:var(--card);border:1px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.campo-opt:active{transform:scale(.98);}
.campo-opt.picked{border-color:var(--warm);background:var(--warm-soft);}
.campo-opt-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.campo-opt-title{font-size:14px;font-weight:600;color:#fff;line-height:1.3;}
.campo-opt-hint{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}

/* Zone result */
.zone-result{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;text-align:center;}
.zr-icon{font-size:56px;animation:pulse 1.5s ease infinite;}
.zr-title{font-family:Gabarito,sans-serif;font-size:20px;font-weight:700;color:#fff;}
.zr-sub{font-size:13px;color:var(--muted);line-height:1.6;max-width:300px;}
.zr-bars{width:100%;max-width:280px;display:flex;flex-direction:column;gap:8px;}
.zr-bar{display:flex;align-items:center;gap:10px;}
.zr-bar-icon{font-size:16px;width:24px;text-align:center;}
.zr-bar-track{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.zr-bar-fill{height:100%;border-radius:3px;transition:width 1s ease .3s;}
.zr-bar-pct{font-size:11px;color:var(--muted);min-width:32px;text-align:right;}

/* ══ CLASSIFICATION ══ */
.biblio-wrap{flex:1;display:flex;flex-direction:column;padding:14px 16px;gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.biblio-sub{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted2);text-align:center;}
.biblio-prompt{font-family:Gabarito,sans-serif;font-size:16px;font-weight:600;color:#fff;line-height:1.5;text-align:center;}
.biblio-hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.5;}
.biblio-progress{font-size:12px;color:var(--muted);text-align:center;}
.biblio-progress span{font-family:Gabarito,sans-serif;color:var(--warm);font-weight:700;}
.biblio-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;background:rgba(212,168,69,.06);border:2px solid rgba(212,168,69,.15);text-align:left;animation:slideUp .35s ease;}
.biblio-item-icon{font-size:28px;flex-shrink:0;}
.biblio-item-name{font-size:14px;font-weight:600;color:#fff;line-height:1.3;}
.biblio-item-desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.3;}
.biblio-shelves{display:flex;flex-direction:column;gap:8px;}
.biblio-shelf{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;background:var(--card);border:2px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.biblio-shelf:active{transform:scale(.98);}
.biblio-shelf.picked{border-color:var(--warm);background:var(--warm-soft);}
.biblio-shelf-icon{font-size:22px;flex-shrink:0;}
.biblio-shelf-info{flex:1;}
.biblio-shelf-name{font-size:13px;font-weight:600;color:#fff;}
.biblio-shelf-count{font-size:11px;color:var(--muted);margin-top:2px;}
.biblio-opts{display:flex;flex-direction:column;gap:8px;padding-bottom:16px;}
.biblio-opt{display:flex;align-items:flex-start;gap:12px;padding:13px;border-radius:14px;background:var(--card);border:1px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.biblio-opt:active{transform:scale(.98);}
.biblio-opt.picked{border-color:var(--warm);background:var(--warm-soft);}
.biblio-opt-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.biblio-opt-title{font-size:14px;font-weight:600;color:#fff;line-height:1.3;}
.biblio-opt-hint{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}

/* ══ BINARY CHOICES ══ */
.esquina-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 16px;gap:14px;overflow:hidden;}
.esquina-sub{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted2);text-align:center;}
.esquina-counter{font-family:Gabarito,sans-serif;font-size:13px;color:var(--muted);}
.esquina-counter span{color:var(--sage);font-weight:700;}
.esquina-prompt{font-family:Gabarito,sans-serif;font-size:15px;font-weight:600;color:#fff;text-align:center;line-height:1.4;}
.esquina-vs{display:flex;align-items:stretch;gap:12px;width:100%;max-width:340px;animation:fadeIn .3s ease;}
.esquina-card{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px 10px;border-radius:16px;background:var(--card);border:2px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;text-align:center;}
.esquina-card:active{transform:scale(.95);}
.esquina-card.picked{border-color:var(--sage);background:var(--sage-soft);transform:scale(1.03);}
.esquina-card.not-picked{opacity:.25;transform:scale(.95);}
.esquina-card-icon{font-size:40px;}
.esquina-card-name{font-family:Gabarito,sans-serif;font-size:14px;font-weight:600;color:#fff;}
.esquina-or{font-family:Gabarito,sans-serif;font-size:12px;color:var(--muted2);align-self:center;}
.esquina-bar{width:100%;max-width:340px;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.esquina-bar-fill{height:100%;background:var(--sage);border-radius:2px;transition:width .3s ease;}
.esquina-opts{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px;}
.esquina-opt{display:flex;align-items:flex-start;gap:12px;padding:13px;border-radius:14px;background:var(--card);border:1px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.esquina-opt:active{transform:scale(.98);}
.esquina-opt.picked{border-color:var(--sage);background:var(--sage-soft);}
.esquina-opt-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.esquina-opt-title{font-size:14px;font-weight:600;color:#fff;line-height:1.3;}
.esquina-opt-hint{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}

/* ══ CHAT SIM ══ */
.recreo-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.recreo-chat{flex:1;display:flex;flex-direction:column;gap:8px;padding:14px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.recreo-sub{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted2);text-align:center;padding:4px 0;}
.recreo-scene{font-size:12px;color:var(--muted);text-align:center;font-style:italic;padding:4px 12px;line-height:1.5;}
.recreo-msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;animation:slideUp .35s ease;}
.recreo-msg.them{align-self:flex-start;background:var(--card);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.recreo-msg.them .recreo-msg-name{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:3px;}
.recreo-msg.me{align-self:flex-end;background:rgba(74,122,217,.12);border:1px solid rgba(74,122,217,.2);color:#fff;border-bottom-right-radius:4px;}
.recreo-msg.narrator{align-self:center;max-width:90%;background:none;border:none;font-size:12px;color:var(--muted);text-align:center;font-style:italic;padding:6px 0;}
.recreo-choices{padding:10px 16px 16px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;border-top:1px solid var(--border);background:rgba(0,0,0,.3);}
.recreo-choice{padding:11px 14px;border-radius:14px;background:var(--card);border:1px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;font-size:13px;color:var(--text);line-height:1.4;}
.recreo-choice:active{transform:scale(.98);}
.recreo-choice.picked{border-color:var(--blue);background:rgba(74,122,217,.1);color:#fff;}
.recreo-choice-hint{font-size:11px;color:var(--muted);margin-top:3px;}
.recreo-typing{align-self:flex-start;padding:8px 14px;font-size:12px;color:var(--muted);animation:pulse 1s ease infinite;}

/* ══ CREATIVE ══ */
.aula-wrap{flex:1;display:flex;flex-direction:column;padding:14px 16px;gap:12px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.aula-sub{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted2);text-align:center;}
.aula-prompt{font-family:Gabarito,sans-serif;font-size:16px;font-weight:600;color:#fff;line-height:1.5;text-align:center;}
.aula-hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.5;}
.aula-wall{position:relative;width:100%;aspect-ratio:5/3;border-radius:14px;background:linear-gradient(180deg,#0e1428 0%,#121a30 100%);border:2px solid rgba(212,168,69,.15);overflow:hidden;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;padding:12px;}
.aula-wall-label{position:absolute;top:6px;left:10px;font-size:10px;color:rgba(212,168,69,.35);font-family:Gabarito,sans-serif;letter-spacing:.1em;}
.aula-wall-item{font-size:28px;animation:slideUp .4s ease;opacity:0;animation-fill-mode:forwards;}
.aula-wall-item:nth-child(2){animation-delay:.1s;}
.aula-wall-item:nth-child(3){animation-delay:.2s;}
.aula-wall-item:nth-child(4){animation-delay:.3s;}
.aula-palette{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.aula-elem{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;background:var(--card);border:2px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.aula-elem:active{transform:scale(.96);}
.aula-elem.selected{border-color:var(--warm);background:var(--warm-soft);}
.aula-elem.disabled{opacity:.3;pointer-events:none;}
.aula-elem-icon{font-size:24px;flex-shrink:0;}
.aula-elem-name{font-size:12px;font-weight:600;color:#fff;line-height:1.3;}
.aula-elem-check{width:18px;height:18px;border-radius:50%;background:var(--warm);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;margin-left:auto;flex-shrink:0;}
.aula-elem.selected .aula-elem-check{display:flex;}
.aula-confirm{align-self:center;margin-top:4px;}
.aula-opts{display:flex;flex-direction:column;gap:8px;padding-bottom:16px;}

/* ══ TIMER/ROLES ══ */
.apagon-wrap{flex:1;display:flex;flex-direction:column;padding:14px 16px;gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.apagon-sub{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted2);text-align:center;}
.apagon-prompt{font-family:Gabarito,sans-serif;font-size:16px;font-weight:600;color:#fff;line-height:1.5;text-align:center;}
.apagon-hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.5;}
.apagon-opts{display:flex;flex-direction:column;gap:8px;padding-bottom:16px;}
.apagon-opt{display:flex;align-items:flex-start;gap:12px;padding:13px;border-radius:14px;background:var(--card);border:1px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.apagon-opt:active{transform:scale(.98);}
.apagon-opt.picked{border-color:var(--purple);background:rgba(139,108,199,.08);}
.apagon-opt-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.apagon-opt-title{font-size:14px;font-weight:600;color:#fff;line-height:1.3;}
.apagon-opt-hint{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.apagon-timer{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:10px;background:rgba(139,108,199,.06);border:1px solid rgba(139,108,199,.15);}
.apagon-timer-icon{font-size:16px;}
.apagon-timer-bar{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.apagon-timer-fill{height:100%;background:var(--purple);border-radius:2px;transition:width 1s linear;}
.apagon-timer-val{font-family:Gabarito,sans-serif;font-size:13px;color:var(--purple);min-width:24px;text-align:right;}
.apagon-vecinos{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.apagon-vecino{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;border-radius:12px;background:var(--card);border:2px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;width:90px;}
.apagon-vecino:active{transform:scale(.96);}
.apagon-vecino.selected{border-color:var(--purple);background:rgba(139,108,199,.08);}
.apagon-vecino.assigned{opacity:.3;pointer-events:none;}
.apagon-vecino-icon{font-size:24px;}
.apagon-vecino-name{font-size:11px;font-weight:600;color:#fff;}
.apagon-vecino-skill{font-size:10px;color:var(--muted);}
.apagon-problems{display:flex;flex-direction:column;gap:8px;}
.apagon-problem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:var(--card);border:2px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.apagon-problem:active{transform:scale(.96);}
.apagon-problem.filled{border-color:var(--purple);background:rgba(139,108,199,.06);}
.apagon-problem-icon{font-size:22px;}
.apagon-problem-info{flex:1;}
.apagon-problem-title{font-size:13px;font-weight:600;color:#fff;}
.apagon-problem-hint{font-size:11px;color:var(--muted);margin-top:2px;}
.apagon-problem-assigned{font-size:11px;color:var(--purple);font-weight:600;margin-top:2px;}

/* Kiosco/Taller budget */
.kiosco-wrap{flex:1;display:flex;flex-direction:column;padding:14px 16px;gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.kiosco-sub{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted2);text-align:center;}
.kiosco-prompt{font-family:Gabarito,sans-serif;font-size:16px;font-weight:600;color:#fff;line-height:1.5;text-align:center;}
.kiosco-hint{font-size:12px;color:var(--muted);text-align:center;}
.kiosco-budget{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;background:rgba(212,168,69,.06);border:1px solid rgba(212,168,69,.15);}
.kiosco-budget-icon{font-size:20px;}
.kiosco-budget-info{flex:1;}
.kiosco-budget-label{font-size:10px;color:var(--muted);letter-spacing:.08em;font-family:Gabarito,sans-serif;}
.kiosco-budget-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:3px;}
.kiosco-budget-fill{height:100%;background:var(--warm);border-radius:2px;transition:width .3s;}
.kiosco-budget-val{font-family:Gabarito,sans-serif;font-size:15px;color:var(--warm);font-weight:700;}
.kiosco-items{display:flex;flex-direction:column;gap:8px;}
.kiosco-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;background:var(--card);border:2px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.kiosco-item:active{transform:scale(.98);}
.kiosco-item.selected{border-color:var(--warm);background:var(--warm-soft);}
.kiosco-item.disabled{opacity:.3;pointer-events:none;}
.kiosco-item-icon{font-size:24px;flex-shrink:0;}
.kiosco-item-info{flex:1;}
.kiosco-item-name{font-size:13px;font-weight:600;color:#fff;}
.kiosco-item-hint{font-size:11px;color:var(--muted);margin-top:2px;}
.kiosco-item-price{font-family:Gabarito,sans-serif;font-size:13px;color:var(--warm);font-weight:700;flex-shrink:0;}
.kiosco-receipt{display:flex;flex-direction:column;gap:4px;padding:8px 12px;border-radius:10px;background:var(--card);border:1px solid var(--border);}
.kiosco-receipt-item{font-size:12px;color:var(--text);display:flex;align-items:center;gap:6px;}
.kiosco-opts{display:flex;flex-direction:column;gap:8px;padding-bottom:16px;}
.kiosco-opt{display:flex;align-items:flex-start;gap:12px;padding:13px;border-radius:14px;background:var(--card);border:1px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.kiosco-opt:active{transform:scale(.98);}
.kiosco-opt.picked{border-color:var(--warm);background:var(--warm-soft);}

/* Selection/items */
.terraza-wrap{flex:1;display:flex;flex-direction:column;padding:14px 16px;gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.terraza-sub{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted2);text-align:center;}
.terraza-prompt{font-family:Gabarito,sans-serif;font-size:16px;font-weight:600;color:#fff;line-height:1.5;text-align:center;}
.terraza-hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.5;}
.terraza-garden{position:relative;width:100%;aspect-ratio:5/3;border-radius:14px;background:linear-gradient(180deg,#0a1220 0%,#0e1628 100%);border:2px solid rgba(61,184,160,.15);overflow:hidden;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;padding:12px;}
.terraza-garden-label{position:absolute;top:6px;left:10px;font-size:10px;color:rgba(61,184,160,.35);font-family:Gabarito,sans-serif;letter-spacing:.1em;}
.terraza-garden-item{font-size:28px;animation:slideUp .4s ease;opacity:0;animation-fill-mode:forwards;}
.terraza-garden-item:nth-child(2){animation-delay:.1s;}
.terraza-garden-item:nth-child(3){animation-delay:.2s;}
.terraza-garden-item:nth-child(4){animation-delay:.3s;}
.terraza-plants{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.terraza-plant{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;background:var(--card);border:2px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.terraza-plant:active{transform:scale(.96);}
.terraza-plant.selected{border-color:var(--green);background:var(--green-soft);}
.terraza-plant.disabled{opacity:.3;pointer-events:none;}
.terraza-plant-icon{font-size:24px;flex-shrink:0;}
.terraza-plant-name{font-size:12px;font-weight:600;color:#fff;line-height:1.3;}
.terraza-plant-check{width:18px;height:18px;border-radius:50%;background:var(--green);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;margin-left:auto;flex-shrink:0;}
.terraza-plant.selected .terraza-plant-check{display:flex;}
.terraza-opts{display:flex;flex-direction:column;gap:8px;padding-bottom:16px;}
.terraza-opt{display:flex;align-items:flex-start;gap:12px;padding:13px;border-radius:14px;background:var(--card);border:1px solid var(--border);cursor:pointer;touch-action:manipulation;transition:all .2s;}
.terraza-opt:active{transform:scale(.98);}
.terraza-opt.picked{border-color:var(--green);background:var(--green-soft);}
.terraza-opt-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.terraza-opt-title{font-size:14px;font-weight:600;color:#fff;line-height:1.3;}
.terraza-opt-hint{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}

/* ══ ZONE INTRO ══ */
.zone-intro{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;background:radial-gradient(ellipse at 50% 40%,rgba(212,168,69,.06),transparent);}
.zi-icon{font-size:72px;animation:float 3s ease-in-out infinite;}
.zi-name{font-family:Gabarito,sans-serif;font-size:24px;font-weight:700;color:#fff;}
.zi-desc{font-size:14px;color:var(--text);line-height:1.7;max-width:300px;opacity:.85;}
.zi-mechanic{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:var(--card);border:1px solid var(--border);max-width:300px;}
.zi-mechanic-icon{font-size:20px;flex-shrink:0;}
.zi-mechanic-text{font-size:12px;color:var(--muted);line-height:1.5;text-align:left;}
.zi-start{margin-top:6px;}

/* ══ RESULTS ══ */
#results-screen{align-items:center;justify-content:flex-start;padding:20px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;background:radial-gradient(ellipse at 50% 20%,#141a2e,#0a0e1a);}
.res-badge{font-family:Gabarito,sans-serif;font-size:11px;letter-spacing:.15em;color:var(--warm);background:var(--warm-soft);padding:5px 14px;border-radius:20px;border:1px solid var(--warm-border);margin-bottom:4px;}
.res-icon{font-size:56px;margin:8px 0;}
.res-title{font-family:Gabarito,sans-serif;font-size:22px;font-weight:700;color:#fff;text-align:center;}
.res-sub{font-size:13px;color:var(--muted);text-align:center;max-width:300px;margin-bottom:8px;}
.res-areas{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px;}
.res-row{display:flex;align-items:center;gap:10px;}
.res-row-icon{font-size:20px;width:28px;text-align:center;}
.res-row-info{flex:1;}
.res-row-name{font-size:12px;font-weight:600;color:#fff;margin-bottom:3px;}
.res-row-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.res-row-fill{height:100%;border-radius:3px;transition:width 1.2s ease .5s;}
.res-row-pct{font-size:12px;min-width:36px;text-align:right;font-weight:700;}
.res-note{margin-top:12px;padding:12px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);font-size:12px;color:var(--muted);line-height:1.6;text-align:center;max-width:340px;}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" class="screen active">
  <div class="intro-badge">AÑO 3 · 15 AÑOS</div>
  <div class="intro-icon">🌃</div>
  <div class="intro-title">La Ciudad Invisible</div>
  <div class="intro-sub">Detrás de la ciudad que todos ven, hay otra. Pasajes ocultos, talleres secretos, muros que hablan. Descubrí qué rol ocupás cuando nadie te obliga.</div>
  <div class="intro-input-group">
  <div class="intro-input">
    <label>Tu nombre para entrar a la ciudad</label>
    <input type="text" id="nameInput" placeholder="Escribí tu nombre..." maxlength="20">
  </div>
  <div class="intro-input">
    <label>Tu email (para guardar tu evolución)</label>
    <input type="email" id="pfEmail" placeholder="nombre@email.com" maxlength="60" autocomplete="email">
  </div>
  <div class="intro-input">
    <label>Código del colegio</label>
    <input type="text" id="pfSchoolCode" placeholder="Ej: SJB-2025" maxlength="20" autocomplete="off">
  </div>

  </div>
  <button class="btn btn-warm" id="startBtn" disabled>Entrar a la ciudad →</button>
</div>

<!-- MAP -->
<div id="map-screen" class="screen">
  <div class="map-header">
    <div class="map-header-row">
      <h2 id="mapHi">Hola</h2>
      <div class="map-header-meta">
        <div class="map-header-tag">v3.0</div>
        <div class="map-header-tag" id="mapDate"></div>
      </div>
    </div>
    <div class="map-header-sub">Elegí una zona para explorar.<br>Zonas descubiertas: <span id="zDone">0</span>/8</div>
  </div>
  <div class="map-scroll" id="mapScroll"></div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="game-top">
    <div class="game-back" onclick="backToMap()">← Mapa</div>
    <div class="game-label" id="gLabel"></div>
  </div>
  <div class="game-body" id="gBody"></div>
</div>

<!-- RESULTS -->
<div id="results-screen" class="screen">
  <div class="res-badge">PERFIL AÑO 3</div>
  <div class="res-icon">🌃</div>
  <div class="res-title">Ciudad descubierta</div>
  <div class="res-sub" id="resName"></div>
  <div class="res-areas" id="resAreas"></div>
  <div id="pf-sync-status"></div>
  <div class="res-note" id="resNote"></div>
</div>

<script>
// ═══ STATE ═══
var GS={name:'',email:'',schoolCode:'',done:{},scores:{},order:[]};
function addScores(sc){for(var k in sc)GS.scores[k]=(GS.scores[k]||0)+sc[k];}

var AREAS=[
  {id:'salud',name:'Ciencias de la Salud',icon:'🩺',color:'#4a7ad9'},
  {id:'exactas',name:'Ciencias Exactas y Naturales',icon:'🔬',color:'#3db8a0'},
  {id:'ing',name:'Ingeniería y Tecnología',icon:'⚙️',color:'#8b6cc7'},
  {id:'sociales',name:'Ciencias Sociales y Humanas',icon:'🌍',color:'#d96a8a'},
  {id:'eco',name:'Ciencias Económicas',icon:'📊',color:'#d4a845'},
  {id:'arte',name:'Arte, Diseño y Arquitectura',icon:'🎨',color:'#d96060'},
  {id:'agro',name:'Ciencias Agropecuarias',icon:'🌱',color:'#5a9a8a'},
  {id:'edu',name:'Educación y Pedagogía',icon:'📚',color:'#c9985a'},
];

var ZONES=[
  {id:'pasaje',     icon:'🚪',name:'El Pasaje',       color:'#d96a8a',glow:'rgba(217,106,138,.15)',desc:'Una entrada secreta, una historia por vivir.'},
  {id:'taller',     icon:'🔧',name:'El Taller',       color:'#d4a845',glow:'rgba(212,168,69,.15)',desc:'Recursos limitados, decisiones infinitas.'},
  {id:'fachada',    icon:'🏗️',name:'La Fachada',      color:'#3db8a0',glow:'rgba(61,184,160,.15)',desc:'Lo que esconden los edificios.'},
  {id:'invernadero',icon:'🌱',name:'El Invernadero',  color:'#8b6cc7',glow:'rgba(139,108,199,.15)',desc:'Un jardín secreto que necesita un equipo.'},
  {id:'mural',      icon:'🎨',name:'El Mural',        color:'#d96060',glow:'rgba(217,96,96,.15)',desc:'Un muro en blanco que pide tu voz.'},
  {id:'frecuencia', icon:'📡',name:'La Frecuencia',   color:'#4a7ad9',glow:'rgba(74,122,217,.15)',desc:'Una radio pirata con voces que importan.'},
  {id:'archivo',    icon:'📂',name:'El Archivo',       color:'#c9985a',glow:'rgba(201,152,90,.15)',desc:'Los secretos de la ciudad, por clasificar.'},
  {id:'umbral',     icon:'⚡',name:'El Umbral',        color:'#5a9a8a',glow:'rgba(90,154,138,.15)',desc:'La puerta entre dos mundos. Elegí rápido.'},
];

// ═══ SCREENS ═══
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var el=document.getElementById(id);el.classList.add('active');el.classList.add('fade-in');
}

// ═══ INTRO ═══
var ni=document.getElementById('nameInput'),sb=document.getElementById('startBtn');
var pfEmailEl=document.getElementById('pfEmail'),pfSchoolEl=document.getElementById('pfSchoolCode');
function pfCheckStart(){sb.disabled=!(ni.value.trim()&&pfEmailEl.value.includes('@')&&pfSchoolEl.value.trim().length>=2);}
ni.addEventListener('input',pfCheckStart);
pfEmailEl.addEventListener('input',pfCheckStart);
pfSchoolEl.addEventListener('input',pfCheckStart);
sb.addEventListener('click',function(){
  GS.name=ni.value.trim();
  GS.email=pfEmailEl.value.trim().toLowerCase();
  GS.schoolCode=pfSchoolEl.value.trim().toUpperCase();
  document.getElementById('mapHi').textContent='Hola, '+GS.name;
  buildMap();showScreen('map-screen');
});

// ═══ MAP ═══
function buildMap(){
  var scroll=document.getElementById('mapScroll');
  scroll.innerHTML='';
  var now=new Date();var dd=now.getDate();var mm=now.getMonth()+1;
  document.getElementById('mapDate').textContent=dd+'/'+mm;
  var grid=document.createElement('div');
  grid.className='map-grid';
  var layout=['pasaje','taller','fachada','invernadero','__compass__','mural','frecuencia','archivo','umbral'];

  layout.forEach(function(id,i){
    if(id==='__compass__'){
      var comp=document.createElement('div');comp.className='map-compass';
      comp.innerHTML='<svg class="compass-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">'+
        '<defs><radialGradient id="cg"><stop offset="0%" stop-color="rgba(212,168,69,.2)"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>'+
        '<circle cx="40" cy="40" r="38" fill="url(#cg)" stroke="rgba(212,168,69,.15)" stroke-width=".5"/>'+
        '<circle cx="40" cy="40" r="24" fill="none" stroke="rgba(212,168,69,.12)" stroke-width=".5"/>'+
        '<circle cx="40" cy="40" r="12" fill="none" stroke="rgba(212,168,69,.2)" stroke-width=".5"/>'+
        '<text x="40" y="36" text-anchor="middle" font-size="16" fill="rgba(212,168,69,.5)">🌃</text>'+
        '<text x="40" y="48" text-anchor="middle" font-size="5" fill="rgba(212,168,69,.4)" font-family="Gabarito,sans-serif">CIUDAD</text>'+
        '</svg>';
      grid.appendChild(comp);
      return;
    }
    var z=ZONES.find(function(zone){return zone.id===id;});
    if(!z)return;
    var card=document.createElement('div');
    card.className='zone-card'+(GS.done[z.id]?' completed':'');
    card.style.animationDelay=(i*60)+'ms';
    card.innerHTML=
      '<div class="zone-card-ring" style="background:'+z.glow+';border:1.5px solid '+z.color+';box-shadow:0 0 16px '+z.glow+'">'+
        '<span style="filter:drop-shadow(0 2px 4px '+z.glow+')">'+z.icon+'</span>'+
      '</div>'+
      '<div class="zone-card-name">'+z.name+'</div>'+
      '<div class="zone-card-desc">'+z.desc+'</div>'+
      '<div class="zone-card-check">✓</div>';
    var style=document.createElement('style');
    style.textContent='.zone-card:nth-child('+(i+1)+') .zone-card-ring::after{border-color:'+z.color+';}';
    card.appendChild(style);
    card.addEventListener('click',function(){if(!GS.done[z.id])enterZone(z.id);});
    grid.appendChild(card);
  });
  scroll.appendChild(grid);
  updateMapUI();
}

function updateMapUI(){
  var n=Object.keys(GS.done).length;
  document.getElementById('zDone').textContent=n;
}

var ZONE_INTROS={
  pasaje:{
    desc:'Encontrás una puerta escondida detrás de una cortina de hiedra. Del otro lado, un pasaje lleno de puestos y gente. Están armando un kiosco cooperativo para el barrio y necesitan decidir cómo organizarlo.',
    mechIcon:'🌿',mechText:'Narrativa con decisiones. Cada elección abre un camino diferente. No hay respuestas correctas, solo las tuyas.'
  },
  taller:{
    desc:'Bajás por una escalera oculta y llegás a un taller subterráneo. Hay herramientas, materiales y un problema: el último experimento dio resultados que nadie esperaba. Hay que investigar con lo que hay.',
    mechIcon:'💰',mechText:'Gestión de recursos. Elegí en qué gastar, decidí qué hacer con lo que sobra, y resolvé los imprevistos del camino.'
  },
  fachada:{
    desc:'Detrás de la fachada de un edificio abandonado, descubrís un parque histórico que quieren demoler para construir un shopping. La comunidad invisible necesita tu ayuda para defenderlo.',
    mechIcon:'🌱',mechText:'Selección y dilema. Elegí qué herramientas usar, enfrentá el conflicto, y decidí cómo actuar.'
  },
  invernadero:{
    desc:'En la azotea más alta de la ciudad invisible hay un invernadero que alimenta a toda la comunidad. Pero hay un problema con la tierra y el equipo necesita organizarse rápido.',
    mechIcon:'⏱️',mechText:'Asignación de roles bajo presión. Tenés 50 segundos para decidir quién hace qué. ¡El reloj corre!'
  },
  mural:{
    desc:'Un muro enorme en el corazón de la ciudad invisible está en blanco. Es tu oportunidad de dejar tu marca. Pero no todo el mundo va a estar de acuerdo con lo que hagas.',
    mechIcon:'✨',mechText:'Composición creativa. Elegí los elementos para tu mural, proponé un estilo, y enfrentá la crítica.'
  },
  frecuencia:{
    desc:'En un sótano con antenas improvisadas funciona una radio pirata. Hoy llegó un mensaje: alguien del grupo se siente excluido. La frecuencia se abre para vos.',
    mechIcon:'💬',mechText:'Chat simulado. Leé lo que dicen los demás y elegí cómo responder. Lo que digas cambia la dinámica del grupo.'
  },
  archivo:{
    desc:'El archivo de la ciudad invisible guarda todo: planos, cartas, recetas, fórmulas. Pero está todo mezclado. Alguien tiene que poner orden, y hay un compañero que necesita ayuda para entender.',
    mechIcon:'📦',mechText:'Clasificación. Asigná cada ítem a su categoría correcta. Tu forma de organizar revela cómo pensás.'
  },
  umbral:{
    desc:'El umbral es la puerta entre la ciudad visible y la invisible. Cada vez que cruzás, tenés que elegir: una cosa o la otra. No hay tiempo para dudar.',
    mechIcon:'⚡',mechText:'Decisiones binarias. 7 elecciones rápidas, una tras otra. Instinto puro.'
  }
};

function enterZone(zoneId){
  GS.currentZone=zoneId;
  var z=ZONES.find(function(z){return z.id===zoneId;});
  document.getElementById('gLabel').textContent=z.name.toUpperCase();
  showScreen('game-screen');
  var body=document.getElementById('gBody');body.innerHTML='';
  var intro=ZONE_INTROS[zoneId];
  if(intro){
    var d=document.createElement('div');d.className='zone-intro fade-in';
    d.innerHTML='<div class="zi-icon">'+z.icon+'</div>'+
      '<div class="zi-name">'+z.name+'</div>'+
      '<div class="zi-desc">'+intro.desc+'</div>'+
      '<div class="zi-mechanic"><div class="zi-mechanic-icon">'+intro.mechIcon+'</div><div class="zi-mechanic-text">'+intro.mechText+'</div></div>'+
      '<button class="btn btn-warm zi-start" id="ziStart">Empezar →</button>';
    body.appendChild(d);
    document.getElementById('ziStart').addEventListener('click',function(){
      body.innerHTML='';
      startZoneGame(zoneId,body);
    });
  }else{
    startZoneGame(zoneId,body);
  }
}

function startZoneGame(zoneId,body){
  switch(zoneId){
    case 'pasaje':buildPasaje(body);break;
    case 'taller':buildTaller(body);break;
    case 'fachada':buildFachada(body);break;
    case 'invernadero':buildInvernadero(body);break;
    case 'mural':buildMural(body);break;
    case 'frecuencia':buildFrecuencia(body);break;
    case 'archivo':buildArchivo(body);break;
    case 'umbral':buildUmbral(body);break;
    default:buildPlaceholder(body,ZONES.find(function(z){return z.id===zoneId;}));break;
  }
}

function buildPlaceholder(c,z){
  c.innerHTML='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;">'+
    '<div style="font-size:48px;">'+z.icon+'</div>'+
    '<div style="font-family:Gabarito,sans-serif;font-size:18px;font-weight:600;color:#fff;">'+z.name+'</div>'+
    '<div style="font-size:13px;color:var(--muted);">Próximamente</div>'+
    '<button class="btn btn-ghost" onclick="backToMap()">← Volver</button></div>';
}

function backToMap(){buildMap();showScreen('map-screen');}

function zoneComplete(zoneId,scores,display){
  addScores(scores);GS.done[zoneId]=true;GS.order.push(zoneId);
  var body=document.getElementById('gBody');
  var barsHtml='';
  if(display.bars)display.bars.forEach(function(b){
    barsHtml+='<div class="zr-bar"><div class="zr-bar-icon">'+b.icon+'</div>'+
      '<div class="zr-bar-track"><div class="zr-bar-fill" style="width:0%;background:'+b.color+'" data-pct="'+b.pct+'"></div></div>'+
      '<div class="zr-bar-pct">'+b.pct+'%</div></div>';
  });

// ═══ RESULTS ═══
function showResults(){
  var areaScores={};AREAS.forEach(function(a){areaScores[a.id]=0;});
  var mapping={
    salud:['S','hS','mSoc','pdcP'],exactas:['hI','mTeo','pdcD','C'],
    ing:['hR','hC','D','pdcC'],sociales:['I','hS','S','mSoc'],
    eco:['hE','mEco','D','hC'],arte:['hA','mEst','mAut'],
    agro:['hR','pdcC','mTra'],edu:['mTra','pdcP','mSoc','S'],
  };
  for(var a in mapping)mapping[a].forEach(function(d){areaScores[a]+=(GS.scores[d]||0);});
  var areaCap={salud:180,exactas:180,ing:180,sociales:180,eco:180,arte:140,agro:140,edu:180};
  var sorted=AREAS.slice().sort(function(a,b){return areaScores[b.id]-areaScores[a.id];});
  var c=document.getElementById('resAreas');c.innerHTML='';
  document.getElementById('resName').textContent=GS.name+', así se ve tu forma de habitar la ciudad';
  sorted.forEach(function(a){
    var cap=areaCap[a.id]||160;
    var pct=Math.min(100,Math.round(areaScores[a.id]/cap*100));
    var r=document.createElement('div');r.className='res-row';
    r.innerHTML='<div class="res-row-icon">'+a.icon+'</div><div class="res-row-info"><div class="res-row-name">'+a.name+'</div>'+
      '<div class="res-row-track"><div class="res-row-fill" style="width:0%;background:'+a.color+'" data-pct="'+pct+'"></div></div></div>'+
      '<div class="res-row-pct" style="color:'+a.color+'">'+pct+'%</div>';
    c.appendChild(r);
  });
  var notes={salud:'cuidado de personas y empatía',exactas:'pensamiento analítico y curiosidad',ing:'resolución técnica de problemas',
    sociales:'interés por las personas y la sociedad',eco:'pensamiento estratégico y resultados',arte:'expresión creativa',
    agro:'conexión con la naturaleza',edu:'vocación de enseñanza'};
  document.getElementById('resNote').textContent=GS.name+' muestra tendencia hacia '+notes[sorted[0].id]+
    ' y '+notes[sorted[1].id]+'. Este perfil se compara con los años anteriores para ver tu evolución.';
  showScreen('results-screen');
  pfSyncResults();
  setTimeout(function(){document.querySelectorAll('.res-row-fill').forEach(function(el){el.style.width=el.dataset.pct+'%';});},300);
}

              {icon:'💗',color:'#d96a8a',pct:Math.round(heart/mx*100)},
              {icon:'🔧',color:'#8b6cc7',pct:Math.round(hands/mx*100)},
            ]
          });
        },500);
      });
      od.appendChild(btn);
    });
  }

  step1();

        for(var k in opt.scores)accum[k]=(accum[k]||0)+opt.scores[k];
        setTimeout(function(){
          var crea=(accum.hA||0)+(accum.mEst||0)+(accum.mAut||0);
          var sci=(accum.hI||0)+(accum.mTeo||0)+(accum.C||0);

//  ZONA: LA FRECUENCIA
//  Chat: radio pirata, compañero excluido
// ═══════════════════════════════════════
function buildFrecuencia(container){
  var accum={};
  var STEPS=[
    {msgs:[
      {type:'narrator',text:'La radio pirata de la ciudad invisible se enciende. Los mensajes llegan uno tras otro.'},
      {type:'them',name:'Nati',text:'Che, ¿alguien habló con Santi? Hace días que no viene al taller.'},
      {type:'them',name:'Facu',text:'Ni idea. Yo lo vi el otro día pero estaba raro, se fue sin saludar.'},
      {type:'them',name:'Nati',text:'Es que el otro día nadie le dio bola cuando propuso su idea para el mural. Se re notó que se sintió mal.'}
    ],choices:[
      {text:'"Le escribo yo. Le pregunto cómo está y si quiere que nos juntemos."',hint:'Acompañar en privado.',scores:{S:14,hS:12,pdcP:8,mSoc:6}},
      {text:'"Tendríamos que hablar como grupo de cómo tratamos las ideas de cada uno."',hint:'Cambiar la dinámica grupal.',scores:{I:12,hC:10,mTra:8,S:6}},
      {text:'"¿Por qué no le dieron bola? ¿Qué había propuesto?"',hint:'Entender antes de actuar.',scores:{hI:12,C:10,mTeo:8,S:6}},
    ]},
    {msgs:[
      {type:'them',name:'Facu',text:'La verdad que su idea estaba buena, pero todos estaban hablando de lo suyo y nadie lo escuchó.'},
      {type:'them',name:'Nati',text:'Es que Santi es más callado. Si no te acercás, no te dice nada.'},
      {type:'narrator',text:'Santi se conecta a la frecuencia. Está escuchando pero no dice nada.'},
      {type:'them',name:'Nati',text:'¡Santi! ¿Estás ahí?'},
      {type:'them',name:'Santi',text:'Sí, estoy escuchando.'}
    ],choices:[
      {text:'"Santi, tu idea del mural era muy buena. Me gustaría que la cuentes de nuevo."',hint:'Darle espacio y reconocimiento.',scores:{S:14,hS:10,mSoc:8,I:6}},
      {text:'"Santi, perdón si el otro día no te escuchamos como correspondía."',hint:'Reconocer el error del grupo.',scores:{I:12,S:10,hS:8,mSoc:8}},
      {text:'"Propongo que cada vez que alguien presente algo, todos escuchemos sin interrumpir."',hint:'Crear un protocolo para que no vuelva a pasar.',scores:{hC:12,I:10,mTra:8,hE:6}},
    ]},
    {msgs:[
      {type:'them',name:'Santi',text:'Gracias. La verdad me sentí invisible. Como que lo que yo decía no importaba.'},
      {type:'them',name:'Facu',text:'Para nada, man. Estuvo mal de nuestra parte.'},
      {type:'them',name:'Nati',text:'¿Querés contarnos tu idea ahora?'},
      {type:'them',name:'Santi',text:'Dale. Era hacer un mural interactivo, que la gente pueda agregar cosas. Un mural vivo.'},
      {type:'narrator',text:'El grupo se engancha con la idea. La energía cambia.'}
    ],choices:[
      {text:'"Me encanta. Podríamos combinar tu idea con lo que ya veníamos haciendo."',hint:'Integrar sin borrar lo anterior.',scores:{I:10,S:8,hA:8,hC:6}},
      {text:'"¿Y cómo lo haríamos técnicamente? ¿Qué materiales necesitaríamos?"',hint:'Bajar la idea a tierra.',scores:{hI:12,hR:8,C:8,pdcC:6}},
      {text:'"Lo más valioso es que Santi se animó a compartirlo. Eso vale más que la idea en sí."',hint:'Lo humano primero.',scores:{S:14,hS:12,mSoc:8,pdcP:6}},
    ]},
    {msgs:[
      {type:'narrator',text:'La frecuencia se llena de ideas. Todos aportan.'},
      {type:'them',name:'Santi',text:'Che, gracias por escucharme. En serio.'},
      {type:'them',name:'Nati',text:'Siempre, Santi. Y si te volvés a sentir así, decinos.'},
      {type:'them',name:'Facu',text:'¿Mañana nos juntamos en el taller para arrancar con el mural interactivo?'},
      {type:'narrator',text:'Te miran esperando tu respuesta.'}
    ],choices:[
      {text:'"¡Sí! Pero primero armemos un plan: qué hace cada uno, qué necesitamos."',hint:'Organización antes de acción.',scores:{hC:10,I:8,mTra:8,D:6}},
      {text:'"Dale. Y que Santi lidere el proyecto, es su idea."',hint:'Darle el protagonismo que merece.',scores:{S:12,I:10,mSoc:8,pdcP:6}},
      {text:'"Vamos, pero propongo que esta vez documentemos todo el proceso."',hint:'Que quede registro para aprender.',scores:{hI:12,C:10,mTeo:8,hA:6}},
    ]}
  ];

  var stepIdx=0;

  function renderStep(){
    if(stepIdx>=STEPS.length){finishFrecuencia();return;}
    var step=STEPS[stepIdx];
    container.innerHTML='';
    var wrap=document.createElement('div');wrap.className='recreo-wrap';
    var chat=document.createElement('div');chat.className='recreo-chat';
    if(stepIdx===0){
      var sub=document.createElement('div');sub.className='recreo-sub';sub.textContent='RADIO PIRATA';
      chat.appendChild(sub);
    }
    wrap.appendChild(chat);
    var choicesDiv=document.createElement('div');choicesDiv.className='recreo-choices';choicesDiv.style.display='none';
    wrap.appendChild(choicesDiv);
    container.appendChild(wrap);

    var msgIdx=0;
    function showNextMsg(){
      if(msgIdx>=step.msgs.length){showChoices();return;}
      var m=step.msgs[msgIdx];
      var el=document.createElement('div');el.className='recreo-msg '+m.type;
      if(m.type==='them')el.innerHTML='<div class="recreo-msg-name">'+m.name+'</div>'+m.text;
      else if(m.type==='narrator')el.textContent=m.text;
      else el.textContent=m.text;
      chat.appendChild(el);
      chat.scrollTop=chat.scrollHeight;
      msgIdx++;
      setTimeout(showNextMsg,600);
    }

    function showChoices(){
      choicesDiv.style.display='flex';
      var answered=false;
      step.choices.forEach(function(ch){
        var btn=document.createElement('div');btn.className='recreo-choice';
        btn.innerHTML=ch.text+'<div class="recreo-choice-hint">'+ch.hint+'</div>';
        btn.addEventListener('click',function(){
          if(answered)return;answered=true;btn.classList.add('picked');
          document.querySelectorAll('.recreo-choice').forEach(function(c){if(c!==btn)c.style.opacity='.3';});
          for(var k in ch.scores)accum[k]=(accum[k]||0)+ch.scores[k];
          var myMsg=document.createElement('div');myMsg.className='recreo-msg me';myMsg.textContent=ch.text.replace(/"/g,'');
          chat.appendChild(myMsg);chat.scrollTop=chat.scrollHeight;
          setTimeout(function(){stepIdx++;renderStep();},700);
        });
        choicesDiv.appendChild(btn);
      });
    }

    showNextMsg();
  }

  function finishFrecuencia(){
    var emp=(accum.S||0)+(accum.hS||0)+(accum.mSoc||0);
    var org=(accum.hC||0)+(accum.I||0)+(accum.mTra||0);
    var ana=(accum.hI||0)+(accum.C||0)+(accum.mTeo||0);
    var act=(accum.D||0)+(accum.hR||0)+(accum.pdcC||0);
    var mx=Math.max(emp,org,ana,act,1);
    zoneComplete('frecuencia',accum,{
      emoji:'📡',title:'¡Frecuencia sintonizada!',
      sub:'Cómo escuchás y respondés cuando alguien se siente invisible dice mucho.',
      bars:[
        {icon:'💗',color:'#d96a8a',pct:Math.round(emp/mx*100)},
        {icon:'📋',color:'#d4a845',pct:Math.round(org/mx*100)},
        {icon:'🔍',color:'#4a7ad9',pct:Math.round(ana/mx*100)},
        {icon:'⚡',color:'#8b6cc7',pct:Math.round(act/mx*100)},
      ]
    });
  }

  renderStep();
}

//  ZONA: EL ARCHIVO
//  Clasificación: enseñar al que no entiende
// ═══════════════════════════════════════
function buildArchivo(container){
  var ITEMS=[
    {icon:'📜',name:'Acta fundacional de la ciudad',desc:'Documento legal de 1890.',area:'hist'},
    {icon:'🧪',name:'Fórmula del agua potabilizada',desc:'Proceso químico para potabilizar.',area:'ciencia'},
    {icon:'📐',name:'Plano de la primera red eléctrica',desc:'Esquema de ingeniería original.',area:'tecnica'},
    {icon:'🎨',name:'Boceto del primer mural del barrio',desc:'Dibujo a carbón sobre papel.',area:'arte'},
    {icon:'📊',name:'Registro censal de 1950',desc:'Datos de población y oficios.',area:'datos'},
    {icon:'💊',name:'Receta de la farmacia comunitaria',desc:'Preparados medicinales caseros.',area:'ciencia'},
    {icon:'📖',name:'Diario de un maestro rural',desc:'Crónica escolar de 1920.',area:'hist'},
    {icon:'⚙️',name:'Manual del molino hidráulico',desc:'Instrucciones técnicas ilustradas.',area:'tecnica'},
    {icon:'🌿',name:'Herbario con plantas medicinales',desc:'Catálogo botánico ilustrado.',area:'ciencia'},
    {icon:'🗳️',name:'Actas de la primera asamblea vecinal',desc:'Registro de debates y votaciones.',area:'hist'},
    {icon:'🎭',name:'Programa del primer teatro del barrio',desc:'Funciones, actores, reseñas.',area:'arte'},
    {icon:'📈',name:'Estadísticas de cosechas por década',desc:'Rendimiento agrícola histórico.',area:'datos'},
  ];

  var SHELVES=[
    {id:'hist',icon:'📜',name:'Historia y memoria',desc:'Lo que cuenta de dónde venimos'},
    {id:'ciencia',icon:'🔬',name:'Ciencia y salud',desc:'Conocimiento aplicado a la vida'},
    {id:'tecnica',icon:'⚙️',name:'Técnica e ingeniería',desc:'Cómo se construyeron las cosas'},
    {id:'arte',icon:'🎨',name:'Arte y cultura',desc:'La expresión de la comunidad'},
    {id:'datos',icon:'📊',name:'Datos y registros',desc:'Los números que cuentan historias'},
  ];

  var queue=ITEMS.slice();var shelfCounts={};
  SHELVES.forEach(function(s){shelfCounts[s.id]=0;});
  var idx=0;var accum={};var answered=false;

  function addLocal(sc){for(var k in sc)accum[k]=(accum[k]||0)+sc[k];}

  var shelfScores={
    hist:{S:6,I:6,mSoc:6,C:4},
    ciencia:{hI:8,mTeo:6,C:6,hS:4},
    tecnica:{hR:8,hI:6,pdcC:6,D:4},
    arte:{hA:8,mEst:6,mAut:6},
    datos:{hI:6,C:6,hC:6,mTeo:4},
  };

  function renderItem(){
    if(idx>=queue.length){finishSort();return;}
    answered=false;container.innerHTML='';
    var item=queue[idx];
    var d=document.createElement('div');d.className='biblio-wrap fade-in';
    d.innerHTML='<div class="biblio-sub">CLASIFICAR ARCHIVO</div>'+
      '<div class="biblio-progress"><span>'+(idx+1)+'/'+queue.length+'</span> documentos clasificados</div>'+
      '<div class="biblio-item"><div class="biblio-item-icon">'+item.icon+'</div><div><div class="biblio-item-name">'+item.name+'</div><div class="biblio-item-desc">'+item.desc+'</div></div></div>'+
      '<div class="biblio-prompt">¿En qué sección va?</div>'+
      '<div class="biblio-shelves" id="bShelves"></div>';
    container.appendChild(d);

    var sd=document.getElementById('bShelves');
    SHELVES.forEach(function(shelf){
      var btn=document.createElement('div');btn.className='biblio-shelf';
      btn.innerHTML='<div class="biblio-shelf-icon">'+shelf.icon+'</div><div class="biblio-shelf-info"><div class="biblio-shelf-name">'+shelf.name+'</div><div class="biblio-shelf-count">'+shelfCounts[shelf.id]+' docs</div></div>';
      btn.addEventListener('click',function(){
        if(answered)return;answered=true;btn.classList.add('picked');
        shelfCounts[shelf.id]++;
        var correct=shelf.id===item.area;
        var sc=Object.assign({},shelfScores[shelf.id]);
        if(correct){for(var k in sc)sc[k]=Math.round(sc[k]*1.4);}
        addLocal(sc);
        setTimeout(function(){idx++;renderItem();},400);
      });
      sd.appendChild(btn);
    });
  }

  function finishSort(){
    answered=false;container.innerHTML='';
    var d=document.createElement('div');d.className='biblio-wrap fade-in';
    d.innerHTML='<div class="biblio-sub">REFLEXIÓN FINAL</div>'+
      '<div class="biblio-prompt">Un compañero no entiende cómo funciona el sistema de clasificación. Tenés que enseñarle. ¿Cómo lo hacés?</div>'+
      '<div class="biblio-opts" id="bOpts"></div>';
    container.appendChild(d);

    var opts=[
      {icon:'🔄',title:'Buscás otra forma de explicarlo: con ejemplos, dibujos, analogías',hint:'Si no entiende, el problema es la explicación, no él.',scores:{mTra:14,pdcP:10,S:8,hS:6}},
      {icon:'📝',title:'Le armás ejercicios prácticos para que clasifique y aprenda haciendo',hint:'Se aprende haciendo, no escuchando.',scores:{hR:12,D:10,pdcC:8,mTra:6}},
      {icon:'📚',title:'Le recomendás recursos: un video, un libro, una guía paso a paso',hint:'A veces otro formato conecta mejor.',scores:{hI:12,C:10,mTeo:8,pdcD:6}},
      {icon:'👉',title:'Lo derivás a alguien que sepa explicar mejor que vos',hint:'Reconocer los límites propios también es inteligente.',scores:{I:10,hC:8,S:8,mSoc:6}},
    ];

    var od=document.getElementById('bOpts');
    opts.forEach(function(opt){
      var btn=document.createElement('div');btn.className='biblio-opt';
      btn.innerHTML='<div class="biblio-opt-icon">'+opt.icon+'</div><div><div class="biblio-opt-title">'+opt.title+'</div><div class="biblio-opt-hint">'+opt.hint+'</div></div>';
      btn.addEventListener('click',function(){
        if(answered)return;answered=true;btn.classList.add('picked');
        document.querySelectorAll('.biblio-opt').forEach(function(o){if(o!==btn)o.style.opacity='.3';});
        addLocal(opt.scores);
        setTimeout(function(){
          var sci=(accum.hI||0)+(accum.C||0)+(accum.mTeo||0);
          var prac=(accum.hR||0)+(accum.D||0)+(accum.hC||0);
          var care=(accum.S||0)+(accum.hS||0)+(accum.pdcP||0);
          var crea=(accum.hA||0)+(accum.mEst||0)+(accum.mAut||0);
          var mx=Math.max(sci,prac,care,crea,1);
          zoneComplete('archivo',accum,{
            emoji:'📂',title:'¡Archivo ordenado!',
            sub:'Tu forma de organizar y enseñar revela cómo pensás.',
            bars:[
              {icon:'🔬',color:'#3db8a0',pct:Math.round(sci/mx*100)},
              {icon:'🔧',color:'#8b6cc7',pct:Math.round(prac/mx*100)},
              {icon:'💗',color:'#d96a8a',pct:Math.round(care/mx*100)},
              {icon:'🎨',color:'#d96060',pct:Math.round(crea/mx*100)},
            ]
          });
        },500);
      });
      od.appendChild(btn);
    });
  }

  renderItem();
}

// ═══════════════════════════════════════
//  ZONA: EL UMBRAL
//  Decisiones binarias: colaborar con alguien difícil
// ═══════════════════════════════════════
function buildUmbral(container){
  var PAIRS=[
    {prompt:'Un proyecto importante. ¿Con quién trabajás?',
      a:{icon:'🤝',name:'Alguien que te cae bien',scores:{S:8,mSoc:6,I:4}},
      b:{icon:'🧠',name:'Alguien que sabe mucho pero es difícil',scores:{hI:8,C:6,D:6}}},
    {prompt:'Tenés que tomar una decisión. ¿Cómo la tomás?',
      a:{icon:'💭',name:'Pensás mucho antes de actuar',scores:{C:10,hI:8,mTeo:4}},
      b:{icon:'⚡',name:'Actuás y ajustás sobre la marcha',scores:{D:8,hR:6,pdcC:4}}},
    {prompt:'Un conflicto en el grupo. ¿Qué hacés?',
      a:{icon:'🗣️',name:'Lo hablás abiertamente',scores:{S:10,I:8,mSoc:6}},
      b:{icon:'📝',name:'Escribís un mensaje pensado',scores:{C:8,hI:6,hA:4}}},
    {prompt:'Te ofrecen liderar un proyecto grande. ¿Qué sentís?',
      a:{icon:'🔥',name:'Entusiasmo: me encanta coordinar',scores:{I:10,hC:8,hE:6}},
      b:{icon:'🔬',name:'Prefiero hacer mi parte bien, sin coordinar',scores:{hI:8,C:6,mTeo:4}}},
    {prompt:'Alguien critica tu trabajo. ¿Cómo reaccionás?',
      a:{icon:'👂',name:'Escuchás y aprendés',scores:{S:8,C:6,hS:6}},
      b:{icon:'🛡️',name:'Defendés tu punto de vista',scores:{D:8,hA:6,mAut:6}}},
    {prompt:'Hay que explicar algo complejo. ¿Cómo lo hacés?',
      a:{icon:'📊',name:'Con datos y gráficos',scores:{hI:10,C:8,mTeo:4}},
      b:{icon:'🎭',name:'Con una historia o metáfora',scores:{hA:8,mEst:6,S:4}}},
    {prompt:'El proyecto terminó. ¿Qué hacés con lo que aprendiste?',
      a:{icon:'📓',name:'Lo documentás para otros',scores:{mTra:10,pdcP:8,hI:4}},
      b:{icon:'🚀',name:'Arrancás otro proyecto enseguida',scores:{D:10,hR:8,hE:4}}},
  ];

  var idx=0;var accum={};var answered=false;

  function addLocal(sc){for(var k in sc)accum[k]=(accum[k]||0)+sc[k];}

  function renderPair(){
    if(idx>=PAIRS.length){finishUmbral();return;}
    answered=false;container.innerHTML='';
    var p=PAIRS[idx];
    var d=document.createElement('div');d.className='esquina-wrap fade-in';
    d.innerHTML='<div class="esquina-sub">EL UMBRAL</div>'+
      '<div class="esquina-counter">Decisión <span>'+(idx+1)+'/'+PAIRS.length+'</span></div>'+
      '<div class="esquina-bar"><div class="esquina-bar-fill" style="width:'+(idx/PAIRS.length*100)+'%"></div></div>'+
      '<div class="esquina-prompt">'+p.prompt+'</div>'+
      '<div class="esquina-vs" id="eCards"></div>';
    container.appendChild(d);
    var cd=document.getElementById('eCards');

    [p.a,p.b].forEach(function(opt,oi){
      if(oi===1){var sep=document.createElement('div');sep.className='esquina-or';sep.textContent='o';cd.appendChild(sep);}
      var card=document.createElement('div');card.className='esquina-card';
      card.innerHTML='<div class="esquina-card-icon">'+opt.icon+'</div><div class="esquina-card-name">'+opt.name+'</div>';
      card.addEventListener('click',function(){
        if(answered)return;answered=true;card.classList.add('picked');
        document.querySelectorAll('.esquina-card').forEach(function(c){if(c!==card)c.classList.add('not-picked');});
        addLocal(opt.scores);
        setTimeout(function(){idx++;renderPair();},500);
      });
      cd.appendChild(card);
    });
  }

  function finishUmbral(){
    answered=false;container.innerHTML='';
    var d=document.createElement('div');d.className='esquina-wrap fade-in';
    d.innerHTML='<div class="esquina-sub">REFLEXIÓN</div>'+
      '<div class="esquina-prompt">Cruzaste el umbral muchas veces. ¿Con cuál te identificás más?</div>'+
      '<div class="esquina-opts" id="eOpts"></div>';
    container.appendChild(d);

    var opts=[
      {icon:'🤝',title:'Soy de los que priorizan las relaciones, incluso si es más difícil',hint:'Las personas importan más que los resultados.',scores:{S:12,I:10,mSoc:8,hS:6}},
      {icon:'🧠',title:'Soy de los que analizan todo antes de actuar',hint:'La información es poder.',scores:{hI:12,C:10,mTeo:8}},
      {icon:'⚡',title:'Soy de los que actúan y aprenden en el camino',hint:'La experiencia enseña más que la teoría.',scores:{D:12,hR:10,hE:8}},
      {icon:'🎨',title:'Soy de los que buscan formas nuevas de hacer las cosas',hint:'La creatividad no es solo arte, es método.',scores:{hA:10,mEst:8,mAut:8,hI:6}},
    ];

    var od=document.getElementById('eOpts');
    opts.forEach(function(opt){
      var btn=document.createElement('div');btn.className='esquina-opt';
      btn.innerHTML='<div class="esquina-opt-icon">'+opt.icon+'</div><div><div class="esquina-opt-title">'+opt.title+'</div><div class="esquina-opt-hint">'+opt.hint+'</div></div>';
      btn.addEventListener('click',function(){
        if(answered)return;answered=true;btn.classList.add('picked');
        document.querySelectorAll('.esquina-opt').forEach(function(o){if(o!==btn)o.style.opacity='.3';});
        addLocal(opt.scores);
        setTimeout(function(){
          var social=(accum.S||0)+(accum.I||0)+(accum.mSoc||0);
          var explore=(accum.hI||0)+(accum.C||0)+(accum.mTeo||0);
          var action=(accum.D||0)+(accum.hR||0)+(accum.pdcC||0);
          var creative=(accum.hA||0)+(accum.mEst||0)+(accum.mAut||0);
          var mx=Math.max(social,explore,action,creative,1);
          zoneComplete('umbral',accum,{
            emoji:'⚡',title:'¡Umbral cruzado!',
            sub:'En cada decisión rápida se ve qué te mueve.',
            bars:[
              {icon:'👥',color:'#d96a8a',pct:Math.round(social/mx*100)},
              {icon:'🔍',color:'#3db8a0',pct:Math.round(explore/mx*100)},
              {icon:'⚡',color:'#d4a845',pct:Math.round(action/mx*100)},
              {icon:'🎨',color:'#d96060',pct:Math.round(creative/mx*100)},
            ]
          });
        },500);
      });
      od.appendChild(btn);
    });
  }

  renderPair();
}

var PF_PATH_NUMBER = 3;

var PF_MAPPING = {
  salud:['S','hS','mSoc','pdcP'], exactas:['hI','mTeo','pdcD','C'],
  ing:['hR','hC','D','pdcC'], sociales:['I','hS','S','mSoc'],
  eco:['hE','mEco','D','hC'], arte:['hA','mEst','mAut'],
  agro:['hR','pdcC','mTra'], edu:['mTra','pdcP','mSoc','S']
};
var PF_CAPS = {salud:180,exactas:180,ing:180,sociales:180,eco:180,arte:140,agro:140,edu:180};

function pfComputeAreas(rawScores) {
  var result = {};
  for (var area in PF_MAPPING) {
    var sum = 0;
    PF_MAPPING[area].forEach(function(d){ sum += (rawScores[d]||0); });
    var cap = PF_CAPS[area] || 160;
    result[area] = Math.min(100, Math.round(sum / cap * 100));
  }
  return result;
}

function pfSyncResults() {
  var areaPercentages = pfComputeAreas(GS.scores);
  var payload = {
    p_email: GS.email,
    p_name: GS.name,
    p_school_code: GS.schoolCode,
    p_path_number: PF_PATH_NUMBER,
    p_raw_scores: GS.scores,
    p_area_percentages: areaPercentages
  };

  // Show sync status
  var syncEl = document.getElementById('pf-sync-status');
  if (syncEl) syncEl.textContent = 'Guardando resultados...';

  fetch(PF_SUPABASE_URL + '/rest/v1/rpc/upsert_path_result', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': PF_SUPABASE_KEY,
      'Authorization': 'Bearer ' + PF_SUPABASE_KEY
    },
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (syncEl) {
      if (data && data.success) {
        syncEl.innerHTML = '✓ Resultados guardados · <a href="dashboard-alumno.html?email=' + encodeURIComponent(GS.email) + '" style="color:var(--warm,#f5a623);text-decoration:underline;">Ver mi evolución →</a>';
      } else {
        syncEl.textContent = '✓ Resultados guardados';
      }
    }
  })
  .catch(function(err){
    console.error('PathFinder sync error:', err);
    if (syncEl) syncEl.textContent = 'No se pudieron guardar (sin conexión). Tus resultados están en pantalla.';
  });
}
